name: Build & Deploy

on:
  push:
    branches: 
      - main
      - cd/zeryus/deploy

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEPLOY_USER: zeryus
  DEPLOY_PATH: /opt/ats

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: install custom local model
        run: |
          git clone https://github.com/themajorones/models.git
          cd models && mvn clean install
      - name: Build with Maven
        run: ./mvnw clean package -B

      - name: Verify WAR
        run: |
          ls -l target/*.war

      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autotest-build-artifacts
          path: target/*.war
          retention-days: 30

  deploy:
    needs: build
    runs-on: devnode
    if: success()

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: autotest-build-artifacts
          path: ./

      - name: Verify Downloaded Artifact
        run: |
          ls -l *.war || (echo "WAR not downloaded!" && exit 1)

      - name: Rename WAR file
        run: |
          ls -la *.war
          mv $(ls *war | head -1) server.war

      - name: Deploy WAR and restart service
        run: |
          mkdir -p /opt/ats
          cp server.war /opt/ats/
          
          # Create user service file if it doesn't exist
          mkdir -p ~/.config/systemd/user
          if [ ! -f ~/.config/systemd/user/ats.service ]; then
            cat > ~/.config/systemd/user/ats.service <<'EOF'
          [Unit]
          Description=ATS Spring Boot Service
          After=network.target

          [Service]
          WorkingDirectory=/opt/ats
          ExecStart=/usr/lib/jvm/java-25-openjdk/bin/java \
            --add-opens java.base/java.util.concurrent=ALL-UNNAMED \
            -Xmx1g \
            -Dserver.port=8080 \
            -jar /opt/ats/server.war
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
          EOF
            
            systemctl --user daemon-reload
            systemctl --user enable ats
          fi
          
          # Stop/restart service
          systemctl --user stop ats || true
          systemctl --user start ats
          sleep 3
          systemctl --user status ats

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/health || exit 1

name: Build & Deploy

on:
  push:
    branches: 
      - main
      - cd/zeryus/deploy

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEPLOY_PATH: /opt/ats

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: install custom local model
        run: |
          git clone https://github.com/themajorones/models.git
          cd models && mvn clean install
      - name: Build with Maven
        run: ./mvnw clean package -B

      - name: Verify WAR
        run: |
          ls -l target/*.war

      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autotest-build-artifacts
          path: target/*.war
          retention-days: 30

  deploy:
    needs: build
    runs-on:
      group: deploy
    if: success()

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: autotest-build-artifacts
          path: ./

      - name: Verify Downloaded Artifact
        run: |
          ls -l *.war || (echo "WAR not downloaded!" && exit 1)

      - name: Rename WAR file
        run: |
          ls -la *.war
          mv $(ls *war | head -1) server.war

      - name: Deploy WAR and start service
        run: |
          CURRENT_USER=$(whoami)
          SERVICE_NAME="ats-app"
          SERVICE_DIR="$HOME/.config/systemd/user"
          
          echo "Running as: $CURRENT_USER"
          
          # Create systemd service directory
          mkdir -p "$SERVICE_DIR"
          mkdir -p ${{ env.DEPLOY_PATH }}
          
          # Copy WAR file
          cp server.war ${{ env.DEPLOY_PATH }}/
          
          # Create systemd user service file
          cat > "$SERVICE_DIR/$SERVICE_NAME.service" << 'EOF'
          [Unit]
          Description=Android Test Service Application
          After=network.target
          
          [Service]
          Type=simple
          WorkingDirectory=${{ env.DEPLOY_PATH }}
          ExecStart=/usr/lib/jvm/java-25-openjdk/bin/java \
            --add-opens java.base/java.util.concurrent=ALL-UNNAMED \
            -Xmx1g \
            -Dserver.port=8080 \
            -jar server.war
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          
          [Install]
          WantedBy=default.target
          EOF
          
          # Reload systemd daemon and enable service
          systemctl --user daemon-reload
          systemctl --user enable "$SERVICE_NAME.service"
          
          # Stop existing service if running
          systemctl --user stop "$SERVICE_NAME.service" || true
          sleep 2
          
          # Start the service
          systemctl --user start "$SERVICE_NAME.service"
          sleep 3
          
          # Check service status
          if systemctl --user is-active --quiet "$SERVICE_NAME.service"; then
            echo "Application started successfully via systemd"
            systemctl --user status "$SERVICE_NAME.service"
          else
            echo "Failed to start application"
            systemctl --user status "$SERVICE_NAME.service"
            journalctl --user -u "$SERVICE_NAME.service" -n 20
            exit 1
          fi

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/health || exit 1

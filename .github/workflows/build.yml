name: Build & Deploy

on:
  push:
    branches: 
      - main
      - cd/zeryus/deploy

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEPLOY_PATH: /opt/ats

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: install custom local model
        run: |
          git clone https://github.com/themajorones/models.git
          cd models && mvn clean install
      - name: Build with Maven
        run: ./mvnw clean package -B

      - name: Verify WAR
        run: |
          ls -l target/*.war

      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autotest-build-artifacts
          path: target/*.war
          retention-days: 30

  deploy:
    needs: build
    runs-on:
      group: deploy
    if: success()

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: autotest-build-artifacts
          path: ./artifact

      - name: Resolve WAR artifact
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_DIR="./artifact"
          WAR_FILE="$(find "$ARTIFACT_DIR" -type f -name '*.war' | head -n 1 || true)"

          if [ -z "$WAR_FILE" ]; then
            ARCHIVE_FILE="$(find "$ARTIFACT_DIR" -type f \( -name '*.zip' -o -name '*.tar' -o -name '*.tar.gz' -o -name '*.tgz' \) | head -n 1 || true)"

            if [ -z "$ARCHIVE_FILE" ]; then
              echo "No WAR or archive found in downloaded artifact"
              find "$ARTIFACT_DIR" -maxdepth 3 -type f
              exit 1
            fi

            EXTRACTION_DIR="$(mktemp -d)"
            case "$ARCHIVE_FILE" in
              *.zip)
                unzip -q "$ARCHIVE_FILE" -d "$EXTRACTION_DIR"
                ;;
              *.tar)
                tar -xf "$ARCHIVE_FILE" -C "$EXTRACTION_DIR"
                ;;
              *.tar.gz|*.tgz)
                tar -xzf "$ARCHIVE_FILE" -C "$EXTRACTION_DIR"
                ;;
            esac

            WAR_FILE="$(find "$EXTRACTION_DIR" -type f -name '*.war' | head -n 1 || true)"
          fi

          if [ -z "$WAR_FILE" ]; then
            echo "Unable to locate a WAR file after artifact resolution"
            exit 1
          fi

          cp "$WAR_FILE" ./server.war
          ls -lh ./server.war

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --pull \
            --build-arg WAR_FILE=server.war \
            -t ats-app:${GITHUB_SHA} \
            -t ats-app:latest \
            .

      - name: Deploy Docker container
        shell: bash
        run: |
          set -euo pipefail

          CONTAINER_NAME="ats-app"
          IMAGE_NAME="ats-app:${GITHUB_SHA}"

          docker rm -f "$CONTAINER_NAME" || true

          ENV_FILE="${{ env.DEPLOY_PATH }}/.env"
          ENV_FILE_ARGS=()
          if [ -f "$ENV_FILE" ]; then
            ENV_FILE_ARGS+=(--env-file "$ENV_FILE")
          fi

          docker run -d \
            --name "$CONTAINER_NAME" \
            --network host \
            "${ENV_FILE_ARGS[@]}" \
            -e DATABASE_URL \
            -e DATABASE_USERNAME \
            -e DATABASE_PASSWORD \
            -e CLIENT_ID \
            -e CLIENT_SECRET \
            -e ENCRYPTION_PASSWORD \
            -e ENCRYPTION_SALT \
            --restart unless-stopped \
            "$IMAGE_NAME"

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:7000/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs ats-app --tail 200
          exit 1

name: Build & Deploy

on:
  push:
    branches: 
      - main
      - cd/zeryus/deploy

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEPLOY_USER: zeryus
  DEPLOY_PATH: /opt/ats

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: install custom local model
        run: |
          git clone https://github.com/themajorones/models.git
          cd models && mvn clean install
      - name: Build with Maven
        run: ./mvnw clean package -B

      - name: Verify WAR
        run: |
          ls -l target/*.war

      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autotest-build-artifacts
          path: target/*.war
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: autotest-build-artifacts
          path: ./

      - name: Verify Downloaded Artifact
        run: |
          ls -l *.war || (echo "WAR not downloaded!" && exit 1)

      - name: Rename WAR file
        run: |
          ls -la *.war
          mv $(ls *war | head -1) server.war

      - name: Transfer WAR file to host server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 9090
          source: "server.war"
          target: "${{ env.DEPLOY_PATH }}/"

      - name: Deploy WAR file and restart systemd service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 9090
          script: |
            cd ${{ env.DEPLOY_PATH }}
            /usr/lib/jvm/java-25-openjdk/bin/java \
            --add-opens java.base/java.util.concurrent=ALL-UNNAMED \
            -Xmx1g \
            -Dserver.port=8080 \
            -jar /opt/ats/server.war > server.log 2>&1 &

            # Create service file ONLY if it doesn't exist
              if [ ! -f /etc/systemd/system/ats.service ]; then
                sudo tee /etc/systemd/system/ats.service > /dev/null <<'EOF'
              [Unit]
              Description=ATS Spring Boot Service
              After=network.target

              [Service]
              User=${{ secrets.SERVER_USER }}
              WorkingDirectory=/opt/ats
              ExecStart=/usr/lib/jvm/java-25-openjdk/bin/java \
                --add-opens java.base/java.util.concurrent=ALL-UNNAMED \
                -Xmx1g \
                -Dserver.port=8080 \
                -jar /opt/ats/server.war
              SuccessExitStatus=143
              Restart=always
              RestartSec=5

              [Install]
              WantedBy=multi-user.target
              EOF
                
                sudo systemctl daemon-reload
                sudo systemctl enable ats
              fi
              
              # Always stop/restart
              sudo systemctl stop ats || true
              sudo systemctl start ats
              sleep 3
              sudo systemctl status ats

      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.DEPLOY_HOST }}:8080/health || exit 1

name: Build & Deploy

on:
  push:
    branches: 
      - main
      - cd/zeryus/deploy

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEPLOY_PATH: /opt/ats

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: install custom local model
        run: |
          git clone https://github.com/themajorones/models.git
          cd models && mvn clean install
      - name: Build with Maven
        run: ./mvnw clean package -B

      - name: Verify WAR
        run: |
          ls -l target/*.war

      - name: Upload WAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autotest-build-artifacts
          path: target/*.war
          retention-days: 30

  deploy:
    needs: build
    runs-on:
      group: deploy
    if: success()

    steps:
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: autotest-build-artifacts
          path: ./

      - name: Verify Downloaded Artifact
        run: |
          ls -l *.war || (echo "WAR not downloaded!" && exit 1)

      - name: Rename WAR file
        run: |
          ls -la *.war
          mv $(ls *war | head -1) server.war

      - name: Deploy WAR and start service
        run: |
          CURRENT_USER=$(whoami)
          echo "Running as: $CURRENT_USER"
          
          mkdir -p ${{ env.DEPLOY_PATH }}
          cp server.war ${{ env.DEPLOY_PATH }}/
          
          # Kill any existing Java process
          pkill -f "java.*ats/server.war" || true
          sleep 2
          
          # Start the application in background
          cd ${{ env.DEPLOY_PATH }}
          /usr/lib/jvm/java-25-openjdk/bin/java \
            --add-opens java.base/java.util.concurrent=ALL-UNNAMED \
            -Xmx1g \
            -Dserver.port=8080 \
            -jar server.war > server.log 2>&1 &
          
          echo $! > app.pid
          sleep 3
          
          if ps -p $(cat app.pid) > /dev/null; then
            echo "Application started successfully (PID: $(cat app.pid))"
          else
            echo "Failed to start application"
            cat server.log
            exit 1
          fi

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/health || exit 1
